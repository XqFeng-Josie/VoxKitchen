site_name: VoxKitchen
site_description: Docker-first speech data pipelines for clean, inspectable training datasets
repo_url: https://github.com/XqFeng-Josie/VoxKitchen

theme:
  name: material
  favicon: assets/voxkitchen_logo.svg
  features:
    - content.code.copy
  palette:
    primary: blue

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Examples & Use Cases: examples.md
  - Tutorials:
    - TTS Data Preparation: tutorials/tts-data-prep.md
    - TTS Synthesis: tutorials/tts-synthesis.md
    - ASR Training Data: tutorials/asr-training-data.md
    - Data Cleaning: tutorials/data-cleaning.md
    - Speaker Analysis: tutorials/speaker-analysis.md
  - Concepts:
    - Data Protocol: concepts/data-protocol.md
  - Reference:
    - Operators: reference/operators.md
    - Recipes & Download: reference/recipes.md
    - CLI Commands: reference/cli.md
    - Python Tools API: reference/tools-api.md
    - Pipeline YAML: reference/pipeline-yaml.md
    - Pipeline JSON Schema: reference/schema.md
    - Building Docker Images: docker-build.md
  - Architecture:
    - Overview: architecture.md
    - Multi-env Docker: architecture/multi-env.md

markdown_extensions:
  - admonition
  - attr_list
  - pymdownx.highlight
  - pymdownx.superfences
