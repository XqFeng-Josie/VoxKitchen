site_name: VoxKitchen
site_description: A researcher-friendly speech data processing toolkit
repo_url: https://github.com/XqFeng-Josie/VoxKitchen

theme:
  name: material
  palette:
    primary: blue

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Concepts:
    - Data Protocol: concepts/data-protocol.md
  - Tutorials:
    - TTS Data Preparation: tutorials/tts-data-prep.md
    - ASR Training Data: tutorials/asr-training-data.md
    - Data Cleaning: tutorials/data-cleaning.md
    - Speaker Analysis: tutorials/speaker-analysis.md
  - Reference:
    - Operators: reference/operators.md
    - Recipes & Download: reference/recipes.md
    - CLI Commands: reference/cli.md
    - Python Tools API: reference/tools-api.md
    - Pipeline YAML: reference/pipeline-yaml.md

markdown_extensions:
  - admonition
  - attr_list
  - pymdownx.highlight
  - pymdownx.superfences
