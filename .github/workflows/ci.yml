name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install ruff

      - name: Ruff lint
        run: ruff check voxkitchen tests

      - name: Ruff format check
        run: ruff format --check voxkitchen tests

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          df -h /

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends ffmpeg libsndfile1 sox

      - name: Install package
        env:
          SETUPTOOLS_SCM_PRETEND_VERSION_FOR_VOXKITCHEN: "0.0.0.dev0"
        run: |
          python -m pip install --upgrade pip
          pip install torch torchaudio --index-url https://download.pytorch.org/whl/cpu
          pip install pytest pytest-cov scipy
          # Install the core-cluster extras — all mutually compatible via
          # the env_resolver EXTRA_TO_ENV mapping. This mirrors what the
          # `:slim` Docker image installs, so CI coverage reflects slim's
          # runtime capabilities.
          pip install -e ".[audio,segment,quality,pack,pitch,dnsmos,classify,enhance,viz]"

      - name: Pytest
        # Skip pack_huggingface / pack_parquet tests that need datasets / pyarrow
        # (not in the core cluster); skip viz tests that need plotly.
        run: |
          pytest -v -m "not slow and not gpu" \
            --cov=voxkitchen --cov-report=term-missing \
            --deselect tests/unit/operators/pack/test_pack_huggingface.py \
            --deselect tests/unit/operators/pack/test_pack_parquet.py \
            --deselect tests/unit/viz/test_report.py

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install
        env:
          SETUPTOOLS_SCM_PRETEND_VERSION_FOR_VOXKITCHEN: "0.0.0.dev0"
        run: |
          pip install mypy pydantic pyyaml typer rich soundfile tqdm numpy ffmpeg-python pyloudnorm jsonschema
          pip install -e . --no-deps

      - name: Mypy
        run: mypy voxkitchen
