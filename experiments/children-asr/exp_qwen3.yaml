version: "0.1"
name: children-asr-qwen3
description: "童声长音频 ASR 实验 — Qwen3-ASR（最新架构，支持22种方言）"
work_dir: ./work/${name}
num_gpus: 1
gc_mode: aggressive

ingest:
  source: dir
  args:
    root: /data/xiaoqinfeng/code/VoxKitchen/1200小时童声语音数据/source
    recursive: false

stages:
  - name: resample
    op: resample
    args:
      target_sr: 16000
      target_channels: 1

  - name: vad
    op: silero_vad
    args:
      threshold: 0.3
      min_speech_duration_ms: 500
      min_silence_duration_ms: 500
      speech_pad_ms: 200

  - name: filter
    op: quality_score_filter
    args:
      conditions:
        - "duration > 2.0"
        - "duration < 30.0"

  - name: asr
    op: qwen3_asr
    args:
      model: Qwen/Qwen3-ASR-0.6B
      language: Chinese

  - name: pack
    op: pack_parquet
