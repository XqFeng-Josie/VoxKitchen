version: "0.1"
name: children-asr-paraformer
description: "童声长音频 ASR 实验 — Paraformer（中文特化，最快）"
work_dir: ./work/${name}
num_gpus: 1
gc_mode: aggressive

ingest:
  source: dir
  args:
    root: /data/xiaoqinfeng/code/VoxKitchen/1200小时童声语音数据/source
    recursive: false

stages:
  - name: resample
    op: resample
    args:
      target_sr: 16000
      target_channels: 1

  - name: vad
    op: silero_vad
    args:
      threshold: 0.3          # 低阈值适合童声（声压较弱）
      min_speech_duration_ms: 500
      min_silence_duration_ms: 500  # 较长静音间隔，避免句中断裂
      speech_pad_ms: 200

  - name: filter
    op: quality_score_filter
    args:
      conditions:
        - "duration > 2.0"
        - "duration < 30.0"

  - name: asr
    op: paraformer_asr
    args:
      model: iic/speech_paraformer-large-vad-punc_asr_nat-zh-cn-16k-common-vocab8404-pytorch
      language: zh

  - name: pack
    op: pack_parquet
