version: "0.1"
name: children-eval-paraformer
description: "有标注短音频 CER 评估 — Paraformer"
work_dir: ./work/${name}
num_gpus: 1
gc_mode: keep  # 保留中间文件以便调试

ingest:
  source: dir
  args:
    root: /data/xiaoqinfeng/code/VoxKitchen/1200小时童声语音数据
    recursive: true

stages:
  - name: resample
    op: resample
    args:
      target_sr: 16000
      target_channels: 1

  # 通过时长过滤掉 source/ 里的长文件（>10s 的都是源文件）
  - name: filter_short
    op: quality_score_filter
    args:
      conditions:
        - "duration < 10.0"
        - "duration > 1.0"

  - name: asr
    op: paraformer_asr
    args:
      model: iic/speech_paraformer-large-vad-punc_asr_nat-zh-cn-16k-common-vocab8404-pytorch
      language: zh

  - name: pack
    op: pack_parquet
