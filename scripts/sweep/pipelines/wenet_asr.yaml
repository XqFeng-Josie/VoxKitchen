# scripts/sweep/pipelines/wenet_asr.yaml
# Operator under test: wenet_asr (WeNet production ASR).
# Routes to the 'asr' image — wenet is git-installed into the asr env
# (pinned, submodule-free clone; see the Dockerfile asr-env stage).
version: "0.1"
name: sweep-wenet-asr
work_dir: /app/work/vkit-sweep/wenet_asr
num_cpu_workers: 1
ingest:
  source: dir
  args:
    root: /app/scripts/sweep/fixtures/audio
stages:
  - name: target
    op: wenet_asr
  - name: pack
    op: pack_jsonl
