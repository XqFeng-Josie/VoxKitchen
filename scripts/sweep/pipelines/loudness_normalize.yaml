# scripts/sweep/pipelines/loudness_normalize.yaml
# Operator under test: loudness_normalize (EBU R 128, target −23 LUFS).
version: "0.1"
name: sweep-loudness-normalize
work_dir: /app/work/vkit-sweep/loudness_normalize
num_cpu_workers: 1
ingest:
  source: dir
  args:
    # /app is the WORKDIR inside vkit images; the sweep driver mounts
    # scripts/sweep/fixtures there so every yaml is host-path-independent.
    root: /app/scripts/sweep/fixtures/audio
stages:
  - name: target
    op: loudness_normalize
    args:
      target_lufs: -23.0
  - name: pack
    op: pack_jsonl
