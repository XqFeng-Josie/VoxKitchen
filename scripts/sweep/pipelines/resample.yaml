# scripts/sweep/pipelines/resample.yaml
# Operator under test: resample (downsample to 16 kHz mono).
version: "0.1"
name: sweep-resample
work_dir: /app/work/vkit-sweep/resample
num_cpu_workers: 1
ingest:
  source: dir
  args:
    # /app is the WORKDIR inside vkit images; the sweep driver mounts
    # scripts/sweep/fixtures there so every yaml is host-path-independent.
    root: /app/scripts/sweep/fixtures/audio
stages:
  - name: target
    op: resample
    args:
      target_sr: 16000
      target_channels: 1
  - name: pack
    op: pack_jsonl
