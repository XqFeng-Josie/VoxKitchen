# scripts/sweep/pipelines/speed_perturb.yaml
# Operator under test: speed_perturb (fan-out each cut into multiple speed variants).
version: "0.1"
name: sweep-speed-perturb
work_dir: /app/work/vkit-sweep/speed_perturb
num_cpu_workers: 1
ingest:
  source: dir
  args:
    # /app is the WORKDIR inside vkit images; the sweep driver mounts
    # scripts/sweep/fixtures there so every yaml is host-path-independent.
    root: /app/scripts/sweep/fixtures/audio
stages:
  - name: target
    op: speed_perturb
    args:
      factors: [0.9, 1.0, 1.1]
  - name: pack
    op: pack_jsonl
