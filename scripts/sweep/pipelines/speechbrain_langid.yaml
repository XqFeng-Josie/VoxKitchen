# scripts/sweep/pipelines/speechbrain_langid.yaml
# Operator under test: speechbrain_langid (VoxLingua107 language identification).
version: "0.1"
name: sweep-speechbrain_langid
work_dir: /app/work/vkit-sweep/speechbrain_langid
num_cpu_workers: 1
ingest:
  source: dir
  args:
    # /app is the WORKDIR inside vkit images; the sweep driver mounts
    # scripts/sweep/fixtures there so every yaml is host-path-independent.
    root: /app/scripts/sweep/fixtures/audio
stages:
  - name: target
    op: speechbrain_langid
  - name: pack
    op: pack_jsonl
