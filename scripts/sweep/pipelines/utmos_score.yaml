# scripts/sweep/pipelines/utmos_score.yaml
# Operator under test: utmos_score (UTMOS speech naturalness MOS prediction).
version: "0.1"
name: sweep-utmos-score
work_dir: /app/work/vkit-sweep/utmos_score
num_cpu_workers: 1
ingest:
  source: dir
  args:
    # /app is the WORKDIR inside vkit images; the sweep driver mounts
    # scripts/sweep/fixtures there so every yaml is host-path-independent.
    root: /app/scripts/sweep/fixtures/audio
stages:
  - name: target
    op: utmos_score
  - name: pack
    op: pack_jsonl
