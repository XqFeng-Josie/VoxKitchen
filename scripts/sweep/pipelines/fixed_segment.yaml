# scripts/sweep/pipelines/fixed_segment.yaml
# Operator under test: fixed_segment (split into 10-second chunks).
# NOTE: The plan table listed the arg as "segment_seconds" but the actual
# FixedSegmentConfig field is "segment_duration". Corrected here.
version: "0.1"
name: sweep-fixed-segment
work_dir: /app/work/vkit-sweep/fixed_segment
num_cpu_workers: 1
ingest:
  source: dir
  args:
    # /app is the WORKDIR inside vkit images; the sweep driver mounts
    # scripts/sweep/fixtures there so every yaml is host-path-independent.
    root: /app/scripts/sweep/fixtures/audio
stages:
  - name: target
    op: fixed_segment
    args:
      segment_duration: 10.0
  - name: pack
    op: pack_jsonl
