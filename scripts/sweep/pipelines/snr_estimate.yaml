# scripts/sweep/pipelines/snr_estimate.yaml
# Operator under test: snr_estimate (estimate signal-to-noise ratio per cut).
version: "0.1"
name: sweep-snr-estimate
work_dir: /app/work/vkit-sweep/snr_estimate
num_cpu_workers: 1
ingest:
  source: dir
  args:
    # /app is the WORKDIR inside vkit images; the sweep driver mounts
    # scripts/sweep/fixtures there so every yaml is host-path-independent.
    root: /app/scripts/sweep/fixtures/audio
stages:
  - name: target
    op: snr_estimate
  - name: pack
    op: pack_jsonl
