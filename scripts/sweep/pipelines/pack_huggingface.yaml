version: "0.1"
name: sweep-pack-huggingface
work_dir: /app/work/vkit-sweep/pack_huggingface
num_cpu_workers: 1
ingest:
  source: dir
  args:
    root: /app/scripts/sweep/fixtures/audio
stages:
