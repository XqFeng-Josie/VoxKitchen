# scripts/sweep/pipelines/webrtc_vad.yaml
# Operator under test: webrtc_vad (speech-activity detection via WebRTC VAD).
version: "0.1"
name: sweep-webrtc-vad
work_dir: /app/work/vkit-sweep/webrtc_vad
num_cpu_workers: 1
ingest:
  source: dir
  args:
    # /app is the WORKDIR inside vkit images; the sweep driver mounts
    # scripts/sweep/fixtures there so every yaml is host-path-independent.
    root: /app/scripts/sweep/fixtures/audio
stages:
  - name: target
    op: webrtc_vad
    args:
      aggressiveness: 2
  - name: pack
    op: pack_jsonl
