# scripts/sweep/pipelines/dnsmos_score.yaml
# Operator under test: dnsmos_score (Microsoft DNSMOS P.835 quality scoring).
version: "0.1"
name: sweep-dnsmos-score
work_dir: /app/work/vkit-sweep/dnsmos_score
num_cpu_workers: 1
ingest:
  source: dir
  args:
    # /app is the WORKDIR inside vkit images; the sweep driver mounts
    # scripts/sweep/fixtures there so every yaml is host-path-independent.
    root: /app/scripts/sweep/fixtures/audio
stages:
  - name: target
    op: dnsmos_score
  - name: pack
    op: pack_jsonl
