# scripts/sweep/pipelines/speaker_similarity.yaml
# Operator under test: speaker_similarity (cosine similarity against a reference embedding).
#
# Chain: speaker_embed produces custom.speaker_embedding on each cut;
#        speaker_similarity loads a pre-computed reference embedding (.npy) and
#        compares each cut's embedding via cosine similarity.
#
# NOTE: The plan spec described `reference_embedding_source: first_cut` — that
# field does NOT exist in SpeakerSimilarityConfig. The actual required arg is
# `reference_path` (path to a .npy file). The fixture ref-speaker.npy is a
# 192-dim unit vector generated by `python scripts/sweep/run.py --setup`.
version: "0.1"
name: sweep-speaker-similarity
work_dir: /app/work/vkit-sweep/speaker_similarity
num_cpu_workers: 1
ingest:
  source: dir
  args:
    # /app is the WORKDIR inside vkit images; the sweep driver mounts
    # scripts/sweep/fixtures there so every yaml is host-path-independent.
    root: /app/scripts/sweep/fixtures/audio
stages:
  - name: embed
    op: speaker_embed
    args:
      method: speechbrain
      speechbrain_model: speechbrain/spkrec-ecapa-voxceleb
  - name: target
    op: speaker_similarity
    args:
      # NOTE: `reference_path` is the real Config field name (required, str).
      # Fixture is a 192-dim unit vector matching ECAPA-TDNN output dimensionality.
      reference_path: /app/scripts/sweep/fixtures/embeddings/ref-speaker.npy
  - name: pack
    op: pack_jsonl
