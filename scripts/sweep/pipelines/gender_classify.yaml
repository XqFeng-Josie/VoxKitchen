# scripts/sweep/pipelines/gender_classify.yaml
# Operator under test: gender_classify (pitch-based F0 method; no model download).
version: "0.1"
name: sweep-gender_classify
work_dir: /app/work/vkit-sweep/gender_classify
num_cpu_workers: 1
ingest:
  source: dir
  args:
    # /app is the WORKDIR inside vkit images; the sweep driver mounts
    # scripts/sweep/fixtures there so every yaml is host-path-independent.
    root: /app/scripts/sweep/fixtures/audio
stages:
  - name: target
    op: gender_classify
    args:
      method: f0
      f0_threshold: 165.0
  - name: pack
    op: pack_jsonl
