# scripts/sweep/pipelines/normalize_text.yaml
# Operator under test: normalize_text (strip ASR markup + collapse whitespace).
# Chained: needs supervisions.text from upstream ASR.
# KNOWN FAIL: normalize_text was added in 0.3.1.dev but the published asr image
# was built from 0.3.0 — see plan Task 9 deferred note.
version: "0.1"
name: sweep-normalize-text
work_dir: /app/work/vkit-sweep/normalize_text
num_cpu_workers: 1
ingest:
  source: dir
  args:
    root: /app/scripts/sweep/fixtures/audio
stages:
  - name: asr
    op: faster_whisper_asr
    args:
      model: tiny
      compute_type: int8
  - name: target
    op: normalize_text
  - name: pack
    op: pack_jsonl
