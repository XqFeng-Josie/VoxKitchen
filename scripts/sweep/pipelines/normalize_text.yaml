# scripts/sweep/pipelines/normalize_text.yaml
# Operator under test: normalize_text (strip ASR markup + collapse whitespace).
# Uses a pre-built text manifest (markup baked in) so it runs in pure slim —
# normalize_text is in the core group; chaining a real ASR op (asr-image-only)
# would mis-route. Mirrors cer_wer.yaml's manifest approach.
version: "0.1"
name: sweep-normalize-text
work_dir: /app/work/vkit-sweep/normalize_text
num_cpu_workers: 1
ingest:
  source: manifest
  args:
    path: /app/scripts/sweep/fixtures/manifests/text-markup-1cut.jsonl.gz
stages:
  - name: target
    op: normalize_text
  - name: pack
    op: pack_jsonl
