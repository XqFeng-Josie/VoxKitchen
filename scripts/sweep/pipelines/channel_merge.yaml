# scripts/sweep/pipelines/channel_merge.yaml
# Operator under test: channel_merge (collapse to mono).
version: "0.1"
name: sweep-channel-merge
work_dir: /app/work/vkit-sweep/channel_merge
num_cpu_workers: 1
ingest:
  source: dir
  args:
    # /app is the WORKDIR inside vkit images; the sweep driver mounts
    # scripts/sweep/fixtures there so every yaml is host-path-independent.
    root: /app/scripts/sweep/fixtures/audio
stages:
  - name: target
    op: channel_merge
    args:
      target_channels: 1
  - name: pack
    op: pack_jsonl
