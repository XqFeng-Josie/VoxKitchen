# KNOWN FAIL: cosyvoice package never installed in published tts image.
# The `tts-cosyvoice` extra in pyproject only pulls `modelscope`, not
# the `cosyvoice` package itself (needs git-pin install like fish-speech).
# Tracked in memory `project-cosyvoice-packaging-gap` and the fix plan
# at docs/superpowers/plans/2026-06-01-vkit-test-findings-fixes.md
# Task 10 (deferred).
version: "0.1"
name: sweep-tts-cosyvoice
work_dir: /app/work/vkit-sweep/tts_cosyvoice
num_cpu_workers: 1
num_gpus: 1
ingest:
  source: manifest
  args:
    path: /app/scripts/sweep/fixtures/manifests/text-zh-1cut.jsonl.gz
stages:
  - name: target
    op: tts_cosyvoice
    args:
      mode: cross_lingual
      reference_audio: /app/scripts/sweep/fixtures/audio/zh-tiny.wav
  - name: pack
    op: pack_jsonl
