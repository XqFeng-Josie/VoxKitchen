# CosyVoice is git-cloned into /opt/cosyvoice in the tts-env stage (see the
# Dockerfile) and registered via a .pth file — there is no pip package to
# install. This pipeline was KNOWN FAIL before that landed; it passes once the
# tts image is rebuilt and republished to GHCR.
version: "0.1"
name: sweep-tts-cosyvoice
work_dir: /app/work/vkit-sweep/tts_cosyvoice
num_cpu_workers: 1
num_gpus: 1
ingest:
  source: manifest
  args:
    path: /app/scripts/sweep/fixtures/manifests/text-zh-1cut.jsonl.gz
stages:
  - name: target
    op: tts_cosyvoice
    args:
      mode: cross_lingual
      reference_audio: /app/scripts/sweep/fixtures/audio/zh-tiny.wav
  - name: pack
    op: pack_jsonl
