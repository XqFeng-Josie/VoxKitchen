# scripts/sweep/pipelines/codec_tokenize.yaml
# Operator under test: codec_tokenize (EnCodec discrete token extraction).
version: "0.1"
name: sweep-codec_tokenize
work_dir: /app/work/vkit-sweep/codec_tokenize
num_cpu_workers: 1
ingest:
  source: dir
  args:
    # /app is the WORKDIR inside vkit images; the sweep driver mounts
    # scripts/sweep/fixtures there so every yaml is host-path-independent.
    root: /app/scripts/sweep/fixtures/audio
stages:
  - name: target
    op: codec_tokenize
    args:
      backend: encodec
  - name: pack
    op: pack_jsonl
