# scripts/sweep/pipelines/ffmpeg_convert.yaml
# Operator under test: ffmpeg_convert (re-wrap to WAV).
version: "0.1"
name: sweep-ffmpeg-convert
work_dir: /app/work/vkit-sweep/ffmpeg_convert
num_cpu_workers: 1
ingest:
  source: dir
  args:
    # /app is the WORKDIR inside vkit images; the sweep driver mounts
    # scripts/sweep/fixtures there so every yaml is host-path-independent.
    root: /app/scripts/sweep/fixtures/audio
stages:
  - name: target
    op: ffmpeg_convert
    args:
      target_format: wav
  - name: pack
    op: pack_jsonl
