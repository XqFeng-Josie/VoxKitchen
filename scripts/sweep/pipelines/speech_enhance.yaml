# scripts/sweep/pipelines/speech_enhance.yaml
# Operator under test: speech_enhance (DeepFilterNet neural denoiser; defaults only).
version: "0.1"
name: sweep-speech-enhance
work_dir: /app/work/vkit-sweep/speech_enhance
num_cpu_workers: 1
ingest:
  source: dir
  args:
    # /app is the WORKDIR inside vkit images; the sweep driver mounts
    # scripts/sweep/fixtures there so every yaml is host-path-independent.
    root: /app/scripts/sweep/fixtures/audio
stages:
  - name: target
    op: speech_enhance
  - name: pack
    op: pack_jsonl
