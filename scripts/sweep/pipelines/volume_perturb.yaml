# scripts/sweep/pipelines/volume_perturb.yaml
# Operator under test: volume_perturb (random gain within a dB range).
version: "0.1"
name: sweep-volume-perturb
work_dir: /app/work/vkit-sweep/volume_perturb
num_cpu_workers: 1
ingest:
  source: dir
  args:
    # /app is the WORKDIR inside vkit images; the sweep driver mounts
    # scripts/sweep/fixtures there so every yaml is host-path-independent.
    root: /app/scripts/sweep/fixtures/audio
stages:
  - name: target
    op: volume_perturb
    args:
      min_gain_db: -3.0
      max_gain_db: 3.0
  - name: pack
    op: pack_jsonl
