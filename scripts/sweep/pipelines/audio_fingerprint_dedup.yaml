# scripts/sweep/pipelines/audio_fingerprint_dedup.yaml
# Operator under test: audio_fingerprint_dedup (remove near-duplicate audio via MFCC + simhash).
version: "0.1"
name: sweep-audio-fingerprint-dedup
work_dir: /app/work/vkit-sweep/audio_fingerprint_dedup
num_cpu_workers: 1
ingest:
  source: dir
  args:
    # /app is the WORKDIR inside vkit images; the sweep driver mounts
    # scripts/sweep/fixtures there so every yaml is host-path-independent.
    root: /app/scripts/sweep/fixtures/audio
stages:
  - name: target
    op: audio_fingerprint_dedup
    args:
      # NOTE: Config field is `similarity_threshold` (int hamming distance),
      # NOT `threshold` (float) — plan table had the wrong arg name.
      similarity_threshold: 3
  - name: pack
    op: pack_jsonl
