# scripts/sweep/pipelines/mel_extract.yaml
# Operator under test: mel_extract (80-bin log-mel spectrogram via torchaudio/librosa).
version: "0.1"
name: sweep-mel_extract
work_dir: /app/work/vkit-sweep/mel_extract
num_cpu_workers: 1
ingest:
  source: dir
  args:
    # /app is the WORKDIR inside vkit images; the sweep driver mounts
    # scripts/sweep/fixtures there so every yaml is host-path-independent.
    root: /app/scripts/sweep/fixtures/audio
stages:
  - name: target
    op: mel_extract
    args:
      n_mels: 80
  - name: pack
    op: pack_jsonl
