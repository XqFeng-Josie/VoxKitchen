default_install_hook_types: [pre-commit, pre-push]

repos:
  # Match the ruff version used by CI / dev (`ruff --version` shows 0.15.x).
  # When the hook pin lags behind, commit-time formatting differs from CI and
  # newly-formatted-on-CI files slip into the tree as "needs reformat" later.
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.10
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
        args: [--maxkb=500]

  - repo: local
    hooks:
      - id: mypy
        name: mypy (project venv)
        entry: mypy
        language: system
        types: [python]
        pass_filenames: false
        files: ^(voxkitchen|tests)/
        args: [voxkitchen, tests]
      - id: local-ci-pre-push
        name: local CI checks before push
        entry: scripts/check-ci.sh
        language: system
        pass_filenames: false
        stages: [pre-push]
