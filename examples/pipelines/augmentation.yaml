# Data augmentation pipeline: resample → speed perturbation → volume perturbation → pack
#
# Demonstrates the three augmentation operators. Starting from raw audio,
# this pipeline produces 3x the original data (one copy per speed factor),
# each with a random volume adjustment.
#
# Usage:
#   vkit run examples/pipelines/augmentation.yaml
#
# Prerequisites:
#   pip install voxkitchen[audio]
#   Put .wav/.flac/.mp3 files in ./data/

version: "0.1"
name: augmentation
description: "Augment audio with speed and volume perturbation"
work_dir: ./work/${name}

ingest:
  source: dir
  args:
    root: ./data
    recursive: true

stages:
  # 1. Resample to 16kHz mono (standard for speech processing)
  - name: resample
    op: resample
    args:
      target_sr: 16000
      target_channels: 1

  # 2. Speed perturbation: each input cut produces 3 output cuts
  #    - 0.9x (slower, lower pitch, ~11% longer)
  #    - 1.0x (original, unchanged)
  #    - 1.1x (faster, higher pitch, ~9% shorter)
  - name: speed
    op: speed_perturb
    args:
      factors: [0.9, 1.0, 1.1]

  # 3. Volume perturbation: random gain between -6 dB and +6 dB
  #    Gain is deterministic per cut (seeded from cut ID) for reproducibility.
  - name: volume
    op: volume_perturb
    args:
      min_gain_db: -6.0
      max_gain_db: 6.0

  # 4. Pack to JSONL manifest
  - name: pack
    op: pack_jsonl
