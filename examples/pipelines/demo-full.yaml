# Full demo: opus → wav → VAD → SNR → DNSMOS → ASR → gender → filter → pack
# Covers: VAD, quality metrics (SNR, DNSMOS), ASR transcription, gender classification.
#
# Recommended: run via Docker (no extras to manage, all operators included):
#   vkit docker run examples/pipelines/demo-full.yaml
#
# Local run (operators span two clusters — check extras compatibility first):
#   pip install -e ".[segment,asr,dnsmos]"
#   vkit run examples/pipelines/demo-full.yaml

version: "0.1"
name: demo-full
work_dir: ./work/${name}
num_cpu_workers: 1

ingest:
  source: dir
  args:
    root: ./examples/demo_data
    recursive: true

stages:
  # 1. Convert opus → wav
  - name: to_wav
    op: ffmpeg_convert
    args:
      target_format: wav

  # 2. Speech activity detection — split long files into speech segments
  - name: vad
    op: silero_vad
    args:
      threshold: 0.5
      min_speech_duration_ms: 500
      min_silence_duration_ms: 300

  # 3. Materialize each VAD segment as a separate wav file
  - name: extract
    op: ffmpeg_convert
    args:
      target_format: wav

  # 4. Quality metrics
  - name: snr
    op: snr_estimate

  - name: clipping
    op: clipping_detect

  - name: dnsmos
    op: dnsmos_score

  # 5. ASR transcription (tiny model — fast, good enough for demo)
  - name: asr
    op: faster_whisper_asr
    args:
      model: tiny
      compute_type: int8       # runs on CPU; switch to float16 on GPU

  # 6. Gender classification (f0-based, no extra model download)
  - name: gender
    op: gender_classify
    args:
      method: f0
      f0_threshold: 165.0

  # 7. Filter out bad segments
  - name: filter
    op: quality_score_filter
    args:
      conditions:
        - "duration > 1"
        - "duration < 30"
        - "metrics.snr > 5"
        - "metrics.clipping_ratio < 0.01"

  # 8. Write JSONL manifest (all metrics auto-exported per cut)
  - name: pack
    op: pack_jsonl
