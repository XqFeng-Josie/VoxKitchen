# Full demo pipeline: opus → wav → VAD → extract → diarize → quality → ASR → langid → gender → filter → pack
# Usage: vkit run examples/pipelines/demo-full.yaml
# Requires: pip install voxkitchen[asr,whisper,pitch,dnsmos,diarize]

version: "0.1"
name: demo-full
work_dir: ./work/${name}
num_cpu_workers: 1

ingest:
  source: dir
  args:
    root: ./examples/demo_data
    recursive: true

stages:
  # 1. Convert opus → wav
  - name: to_wav
    op: ffmpeg_convert
    args:
      target_format: wav

  # 2. Speech activity detection — split long files into speech segments
  - name: vad
    op: silero_vad
    args:
      threshold: 0.5
      min_speech_duration_ms: 500
      min_silence_duration_ms: 300

  # 3. Materialize each VAD segment as a separate wav file (keeps original sr)
  - name: extract
    op: ffmpeg_convert
    args:
      target_format: wav

  # 4. Speaker diarization — assign speaker labels to each segment
  - name: diarize
    op: pyannote_diarize
    args:
      model: pyannote/speaker-diarization-3.1

  # 5-8. Quality metrics (all write to cut.metrics, auto-exported by pack_jsonl)
  - name: snr
    op: snr_estimate

  - name: pitch
    op: pitch_stats

  - name: clipping
    op: clipping_detect

  - name: dnsmos
    op: dnsmos_score

  # 9. ASR transcription (use whisper_openai_asr on macOS, faster_whisper_asr on Linux GPU)
  - name: asr
    op: whisper_openai_asr
    args:
      model: tiny
      fp16: false                 # set true on GPU

  # 10. Language detection
  - name: langid
    op: whisper_langid
    args:
      model: tiny
      backend: openai

  # 11. Gender classification
  - name: gender
    op: gender_classify
    args:
      method: f0
      f0_threshold: 165.0

  # 12. Filter out bad segments
  - name: filter
    op: quality_score_filter
    args:
      conditions:
        - "duration > 1"
        - "duration < 30"
        - "metrics.snr > 5"
        - "metrics.clipping_ratio < 0.01"

  # 13. Write flat JSONL manifest (all metrics auto-exported)
  - name: pack
    op: pack_jsonl
