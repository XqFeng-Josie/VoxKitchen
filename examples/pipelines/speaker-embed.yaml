# Extract speaker embeddings from speech segments.
# Usage:
#   vkit docker run --tag slim examples/pipelines/speaker-embed.yaml --dry-run
#   vkit docker run --tag slim examples/pipelines/speaker-embed.yaml

version: "0.1"
name: speaker-embed
description: "Extract speaker embeddings using SpeechBrain"
work_dir: ./work/${name}

ingest:
  source: dir
  args:
    root: ./data

stages:
  - name: resample
    op: resample
    args: { target_sr: 16000, target_channels: 1 }

  - name: vad
    op: silero_vad
    args: { threshold: 0.5 }

  # Extract a speaker embedding per segment.
  # Stored in cut.custom["speaker_embedding"] as list[float].
  - name: embed
    op: speaker_embed
    args:
      method: speechbrain
      speechbrain_model: speechbrain/spkrec-ecapa-voxceleb

  - name: pack
    op: pack_jsonl
