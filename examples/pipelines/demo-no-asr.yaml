# Demo pipeline without ASR — runs on macOS without CTranslate2 issues.
# Usage: vkit run examples/pipelines/demo-no-asr.yaml
# Requires: pip install -e ".[segment,pitch]"  (optional: [dnsmos] for MOS scores)

version: "0.1"
name: demo-no-asr
work_dir: ./work/${name}
num_cpu_workers: 1

ingest:
  source: dir
  args:
    root: ./examples/demo_data
    recursive: true

stages:
  - name: to_wav
    op: ffmpeg_convert
    args:
      target_format: wav

  - name: vad
    op: silero_vad
    args:
      threshold: 0.5
      min_speech_duration_ms: 500
      min_silence_duration_ms: 300

  # Materialize each VAD segment as a separate wav file (keeps original sr)
  - name: extract
    op: ffmpeg_convert
    args:
      target_format: wav

  # Quality metrics
  - name: snr
    op: snr_estimate

  - name: pitch
    op: pitch_stats

  - name: clipping
    op: clipping_detect

  # Annotation
  - name: gender
    op: gender_classify
    args:
      method: f0
      f0_threshold: 165.0

  # Filter
  - name: filter
    op: quality_score_filter
    args:
      conditions:
        - "duration > 1"
        - "duration < 30"
        - "metrics.snr > 5"
        - "metrics.clipping_ratio < 0.01"

  # Output
  - name: pack
    op: pack_jsonl
