# Encode audio into neural codec tokens for codec-LM TTS.
# Used for VALL-E, CosyVoice, Fish-Speech, GPT-SoVITS training data.
#
# Usage:
#   vkit docker run --tag slim examples/pipelines/codec-tokenize.yaml --dry-run
#   vkit docker run --tag slim examples/pipelines/codec-tokenize.yaml

version: "0.1"
name: codec-tokenize
description: "Encode audio into EnCodec/DAC discrete tokens"
work_dir: ./work/${name}

ingest:
  source: dir
  args:
    root: ./data

stages:
  - name: resample
    op: resample
    args: { target_sr: 24000, target_channels: 1 }

  - name: tokenize
    op: codec_tokenize
    args:
      backend: encodec          # or "dac"
      bandwidth: 6.0            # kbps (encodec only)

  - name: pack
    op: pack_jsonl
