# Forced alignment: ASR first, then align words to audio.
# Uses Qwen3-ForcedAligner (11 languages: zh, en, fr, de, ja, ko, etc.)
#
# Usage: vkit run examples/pipelines/forced-align.yaml
# Requires: pip install voxkitchen[asr,align]

version: "0.1"
name: forced-align
description: "Word-level forced alignment via Qwen3-ForcedAligner"
work_dir: ./work/${name}

ingest:
  source: dir
  args:
    root: ./data

stages:
  - name: resample
    op: resample
    args: { target_sr: 16000, target_channels: 1 }

  # ASR first — forced alignment needs text to align against.
  - name: asr
    op: faster_whisper_asr
    args:
      model: base
      language: en

  # Align ASR text to audio at word level.
  # Results stored in cut.custom["word_alignments"] as:
  #   [{"text": "hello", "start": 0.12, "end": 0.58}, ...]
  - name: align
    op: forced_align
    args:
      language: English       # Chinese, English, French, German, Japanese, Korean, etc.

  - name: pack
    op: pack_jsonl
