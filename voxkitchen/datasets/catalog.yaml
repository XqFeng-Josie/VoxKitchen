  - id: daps
    name: DAPS (Device and Produced Speech)
    task: [tts]
    languages: [en]
    hours: 4.5
    license: CC BY-NC 4.0
    domain: clean studio + device-recorded
    summary: >
      Professional studio-quality speech with time-aligned recordings of the
      same speech captured on consumer devices (tablet, smartphone) in
      real-world environments; 20 speakers.
    recommendation: >
      Ideal as clean reference / parallel data for speech enhancement,
      dereverberation, and device-channel robustness, and as a high-quality
      reference for TTS evaluation. Small (~14 min per speaker, ~4.5 h of unique
      content) and non-commercial, so not a training-scale corpus.
    homepage: https://ccrma.stanford.edu/~gautham/Site/daps.html
    notes: >
      Mirrored on Zenodo (record 4660670). 15 versions (3 produced + 12
      device/environment); ~4.5 h of unique speech replicated across versions.
    paper: https://doi.org/10.1109/LSP.2015.2438544

  - id: voxforge
    name: VoxForge
    task: [asr, multilingual]
    languages: [multi]
    license: GNU GPL
    domain: crowdsourced read
    summary: >
      Community-contributed crowdsourced corpus of transcribed read speech
      collected to build free, open acoustic models for open-source ASR engines.
    recommendation: >
      Good for free, copyleft-licensed ASR acoustic-model training and as a
      multilingual baseline, especially where GPL licensing is acceptable.
      Crowdsourced quality and per-language volume vary widely, and the strong
      copyleft can complicate combining it with differently-licensed data.
    homepage: https://www.voxforge.org/
    recommended_pipeline: voxkitchen/templates/pipelines/asr-training-data.yaml
    notes: >
      English is the largest of several languages (also de, ru, es, fr, it,
      ...). GPL applies to submitted audio; exact GPL version not authoritatively
      stated.
